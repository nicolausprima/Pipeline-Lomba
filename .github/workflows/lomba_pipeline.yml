name: Pipeline Lomba IT

on:
  schedule:
    - cron: '0 8 1,15 * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '.github/workflows/**'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Setup credentials
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDS" > credentials.json

      - name: Setup env
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> $GITHUB_ENV
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> $GITHUB_ENV
          echo "GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }}" >> $GITHUB_ENV

      - name: Run pipeline
        id: pipeline
        run: |
          python main.py 2>&1 | tee pipeline.log
          exit ${PIPESTATUS[0]}

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: pipeline.log
          retention-days: 30

      - name: Parse summary
        if: always()
        id: summary
        run: |
          TOTAL=$(grep -oP 'Bersih: \K\d+' pipeline.log || echo "0")
          echo "total_lomba=$TOTAL" >> $GITHUB_OUTPUT

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ steps.pipeline.outcome }}" == "success" ]; then
            MESSAGE="✅ <b>Pipeline Lomba BERHASIL!</b>%0A%0A📊 <b>Total Lomba:</b> ${{ steps.summary.outputs.total_lomba }}%0A📅 <b>Periode:</b> $(date +'%d %B %Y')%0A%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Lihat Detail</a>"
          else
            MESSAGE="❌ <b>Pipeline Lomba GAGAL!</b>%0A%0A⚠️ Check logs:%0A<a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>GitHub Actions</a>"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"